services:
  # Internal-only: reachable by other services as http://api:8000
  api:
    image: php:8.2-cli
    container_name: coding-challenge-api
    volumes:
      - ./api:/app
    working_dir: /app
    command: php -S 0.0.0.0:8000 -t /app
    networks:
      - challenge-network

  # Internal-only: reachable by the frontend proxy as http://backend:8080
  backend:
    image: php:8.2-cli
    container_name: coding-challenge-backend
    volumes:
      - .:/app
    working_dir: /app
    command: php -S 0.0.0.0:8080 -t public
    environment:
      # Reach the mock API through the compose network DNS, not localhost.
      UPSTREAM_API_URL: http://api:8000
    networks:
      - challenge-network
    depends_on:
      - api

  # The only service exposed to the host. Vite proxies /api -> backend.
  frontend:
    image: node:20
    container_name: coding-challenge-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_PROXY_TARGET: http://backend:8080
    networks:
      - challenge-network
    depends_on:
      - backend

networks:
  challenge-network:
    driver: bridge
